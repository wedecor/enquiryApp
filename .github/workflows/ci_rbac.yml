name: RBAC CI Pipeline

on:
  push:
    branches: [main, 'feature/*', 'stabilization/*']
  pull_request:
    branches: [main, 'feature/*', 'stabilization/*']

jobs:
  rbac-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      id-token: write
      contents: read

    steps:
      - name: 📋 Checkout Repository
        uses: actions/checkout@v4

      - name: Guard OIDC secrets
        id: guard
        run: |
          if [[ -z "${GCP_WORKLOAD_IDP:-}" || -z "${GCP_SERVICE_ACCOUNT_EMAIL:-}" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          GCP_WORKLOAD_IDP: ${{ secrets.GCP_WORKLOAD_IDP }}
          GCP_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Skip RBAC pipeline
        if: steps.guard.outputs.skip == 'true'
        run: echo "Skipping RBAC CI: missing OIDC secrets."

      - name: Authenticate to Google Cloud
        if: steps.guard.outputs.skip != 'true'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDP }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: ☕ Setup Java 17
        if: steps.guard.outputs.skip != 'true'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🚀 Setup Node.js 18
        if: steps.guard.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'rules-tests/package-lock.json'

      - name: 🔥 Setup Firebase CLI
        if: steps.guard.outputs.skip != 'true'
        run: npm install -g firebase-tools

      - name: 📱 Setup Flutter
        if: steps.guard.outputs.skip != 'true'
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'
          channel: 'stable'
          cache: true

      - name: 📦 Get Flutter Dependencies
        if: steps.guard.outputs.skip != 'true'
        run: flutter pub get

      - name: 🏗️ Generate Code
        if: steps.guard.outputs.skip != 'true'
        run: dart run build_runner build --delete-conflicting-outputs

      - name: 🔍 Analyze Code
        if: steps.guard.outputs.skip != 'true'
        run: |
          echo "::group::Flutter Analyze"
          flutter analyze --no-fatal-infos
          ANALYZE_EXIT_CODE=$?
          echo "::endgroup::"
          
          if [ $ANALYZE_EXIT_CODE -ne 0 ]; then
            echo "❌ Flutter analyze failed with exit code $ANALYZE_EXIT_CODE"
            exit 1
          fi
          
          echo "✅ Flutter analyze passed"

      - name: 🧪 Run Unit Tests
        if: steps.guard.outputs.skip != 'true'
        run: |
          echo "::group::Unit Tests"
          set -o pipefail
          flutter test --reporter compact 2>&1 | tee flutter_test.log
          FLUTTER_SUMMARY=$(tail -1 flutter_test.log)
          echo "flutter_test_summary=${FLUTTER_SUMMARY}" >> "$GITHUB_ENV"
          echo "::endgroup::"
          echo "✅ ${FLUTTER_SUMMARY}"

      - name: 🛡️ Run Firestore Rules Tests
        if: steps.guard.outputs.skip != 'true'
        run: |
          echo "::group::Firestore Rules Tests"
          set -o pipefail
          bash tool/ci/test_firestore_rules.sh 2>&1 | tee rules_test.log
          RULES_SUMMARY=$(grep '^Tests:' rules_test.log | tail -1 || true)
          if [ -z "$RULES_SUMMARY" ]; then
            RULES_SUMMARY="Rules tests finished (see log for details)"
          fi
          echo "rules_test_summary=${RULES_SUMMARY}" >> "$GITHUB_ENV"
          echo "::endgroup::"
          echo "✅ ${RULES_SUMMARY}"

      - name: 📊 Generate Test Coverage
        if: steps.guard.outputs.skip != 'true'
        run: |
          echo "::group::Test Coverage"
          flutter test --coverage --reporter expanded
          echo "::endgroup::"

      - name: 🎯 Coverage Gate Check
        if: steps.guard.outputs.skip != 'true'
        run: |
          echo "::group::Coverage Analysis"
          bash tools/coverage_gate.sh
          echo "::endgroup::"

      - name: 🌐 Web Build Sanity Check
        if: steps.guard.outputs.skip != 'true'
        run: |
          echo "::group::Web Build"
          flutter build web --target lib/main.dart --dart-define=APP_ENV=prod
          echo "::endgroup::"
          echo "✅ Web build completed successfully"

      - name: 📈 Upload Coverage Reports
        uses: codecov/codecov-action@v4
        if: steps.guard.outputs.skip != 'true' && success()
        with:
          file: ./coverage/lcov.info
          flags: unittests
          name: rbac-coverage

      - name: 📋 Generate CI Summary
        if: always()
        run: |
          if [ "${{ steps.guard.outputs.skip }}" = "true" ]; then
            echo "## 🛡️ RBAC CI Pipeline Results" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "RBAC CI skipped: missing GCP OIDC configuration." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi
          echo "## 🛡️ RBAC CI Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Results:" >> $GITHUB_STEP_SUMMARY
          echo "- 🔍 Code Analysis: completed" >> $GITHUB_STEP_SUMMARY
          echo "- 🧪 Unit Tests: ${flutter_test_summary:-not captured}" >> $GITHUB_STEP_SUMMARY
          echo "- 🛡️ Firestore Rules: ${rules_test_summary:-not captured}" >> $GITHUB_STEP_SUMMARY
          echo "- 📊 Coverage Gate (≥30%): see job logs" >> $GITHUB_STEP_SUMMARY
          echo "- 🌐 Web Build: completed if job succeeded" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📚 Security Documentation:" >> $GITHUB_STEP_SUMMARY
          echo "- [Security Playbook](docs/SECURITY_PLAYBOOK.md)" >> $GITHUB_STEP_SUMMARY
          echo "- [RBAC Runbook](docs/RUNBOOK_RBAC.md)" >> $GITHUB_STEP_SUMMARY
          echo "- [Feature Matrix](docs/FEATURE_MATRIX.md)" >> $GITHUB_STEP_SUMMARY
